<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      max-height: 580px;
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }

    /* Header */
    .header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      padding: 0 20px;
      gap: 4px;
      border-bottom: 1px solid #f0f0f0;
    }
    .tab-bar button {
      padding: 10px 16px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab-bar button:hover { color: #555; }
    .tab-bar button.active {
      color: #03c75a;
      border-bottom-color: #03c75a;
    }

    /* Panels */
    .panel { display: none; padding: 16px 20px; }
    .panel.active { display: block; }

    /* Buttons */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary { background: #03c75a; color: white; }
    .btn-secondary { background: #f5f5f5; color: #333; border: 1px solid #e0e0e0; }
    .btn-danger { background: #ff4444; color: white; }

    /* Batch form */
    .batch-config {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 12px;
      background: #fafafa;
      border-radius: 8px;
      border: 1px solid #f0f0f0;
    }
    .batch-config label {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }
    .batch-config input {
      width: 48px;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
    }
    .batch-config input:focus { border-color: #03c75a; }
    .batch-config .sep { color: #ccc; font-size: 14px; }

    /* Progress */
    .progress {
      margin: 12px 0;
      display: none;
    }
    .progress-bar {
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #03c75a, #00e676);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    /* Status */
    .status-bar {
      padding: 8px 20px;
      font-size: 11px;
      color: #888;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
      min-height: 32px;
      display: flex;
      align-items: center;
    }

    /* Output */
    #output {
      max-height: 300px;
      overflow-y: auto;
      margin: 0;
      padding: 12px 20px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #output:empty { display: none; }

    /* Helper text */
    .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cafe Collector</h1>
    <p>네이버 카페 게시글 수집기</p>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="single">단일 수집</button>
    <button class="tab-btn" data-tab="batch">일괄 수집</button>
  </div>

  <!-- Single -->
  <div id="panel-single" class="panel active">
    <div class="actions">
      <button id="btnCollect" class="btn btn-primary">수집</button>
      <button id="btnSave" class="btn btn-secondary">저장</button>
      <button id="btnCopyJson" class="btn btn-secondary">JSON 복사</button>
      <button id="btnCopyText" class="btn btn-secondary">텍스트 복사</button>
    </div>
    <p class="hint">게시글 페이지에서 제목, 본문, 댓글을 추출합니다.</p>
  </div>

  <!-- Batch -->
  <div id="panel-batch" class="panel">
    <div class="batch-config">
      <label>페이지</label>
      <input id="startPage" type="number" value="1" min="1">
      <span class="sep">~</span>
      <input id="endPage" type="number" value="3" min="1">
      <button id="btnBatch" class="btn btn-primary">수집 시작</button>
      <button id="btnBatchStop" class="btn btn-danger" style="display:none;">중지</button>
    </div>
    <div id="progress" class="progress">
      <div class="progress-bar"><div class="fill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <div class="actions">
      <button id="btnBatchSave" class="btn btn-secondary">저장</button>
      <button id="btnBatchCopy" class="btn btn-secondary">JSON 복사</button>
    </div>
    <p class="hint">게시판/멤버 페이지의 글 목록을 순회하며 수집합니다.<br>팝업을 닫아도 백그라운드에서 수집이 계속됩니다.</p>
  </div>

  <div class="status-bar" id="status">네이버 카페 페이지에서 수집을 시작하세요.</div>
  <div id="output"></div>
  <script src="popup.js"></script>
</body>
</html>
